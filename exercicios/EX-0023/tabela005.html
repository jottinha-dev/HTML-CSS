<head>

    <title>Nova tabela 05 </title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        caption{
            font-weight: bold;
            padding-bottom: 20px;
        }
        table{
            border: 1px solid black;
            border-collapse: collapse;
            width: 500px;
            
        }
        th,td{
            border:1px solid black;
            padding: 10px;
        }
        .amerelo{
            background-color: yellow;
        }
        .vermelho{

        }
        a{

            color: black;
            padding: 10px ;
        }
        a:hover{
            background-color: rgba(0, 247, 255, 0.445);
            border-radius: 10px;
            transition-duration: 0.5s;
            color: red;
        }
        
    </style>
</head>
