<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Gradientes em CSS</title>
    <style>
        *{ /*configurações globais das CSS */
            height: 100%;
        }
        body{
            background-image:radial-gradient(circle, #f8f7f8 0.5%,#FFDE23);
            background-attachment: fixed;
            /*fixar o seu background na tela */
        }
    </style>
</head>
<body>
    <h1 style="color: white;"> testando gradientes </h1>
</body>
</html>
