<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
</head>
<style>
    body{
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }

    div > p{
        display: none;

    }
    div:hover > p{
        display: block;
        color: white;
        background-color: red;
        width: 200px;
    }

    div:hover{
        color: rgb(228, 0, 0);
    }
</style>

<body>
    <h1>Exemplo de hover</h1>
    <a href="pseudoclasse.html"
    target="_blank" rel="exeternal">voltar</a>
    <p>passe o mouse sobre o texto abaixo</p>
    <div>
        passe o mouse abaixo
        <p> Texto escondido...</p>
    </div>
    <p> fim do exemplo </p>
</body>
</html>
