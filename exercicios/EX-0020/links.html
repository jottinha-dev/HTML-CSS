<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        /* SELETORES PERSONALIZADOS

        #  = id
        .  = class
        :  =  pseudo-class
        :: = pseudo-element
        >  = children 

        */
        body{
            font-family: sans-serif;
        }
        a{
            color: rgb(255, 0, 0);
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: purple;
        }
        a:hover{
            text-decoration: underline;
            color: black;
        }
        a:active{
            color: rgb(0, 17, 170);
        }
        .especial::before{
            content:'✽';
        }
        a::after{
            content:'[link]';
            text-decoration: none;
            font-weight: normal;
            margin-left: 5px;
        }
        
    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="exeternal">Repositório github</a></li>
        <li><a href="https://youtube.com" target="_blank" rel="exeternal" class="especial">Canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank" rel="exeternal">site do Cursoemvideo</a> </li>
    </ul>
</body>
</html>
