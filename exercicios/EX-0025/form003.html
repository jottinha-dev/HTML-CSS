<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario 03</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-size: 1em;
            padding-bottom: 50px;
        }
        fieldset{
            background-color: rgb(220, 237, 243);
            color: rgba(0, 0, 0, 0.692);
            border-radius: 40px;
            padding-right: 50px;
            width: 400px;
            text-align: left;
            margin: auto;
            border-color: black;
            font-size: 0.8em;
        }
        p{
            font-weight: bolder;
            padding: 10px;
        }
        legend{
            text-align: center;
            font-weight: bolder;
            font-size: 2em;
            color: black;
        }
    </style>
</head>
<body>
    <h1> teste de formulario </h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <fieldset>
        <legend> Dados pessoais </legend>
        <p>
            <label for="inome"> nome </label>
            <input type="text" name="nome" id="inome" required maxlength="30" placeholder="bota o nome ai " autocomplete="name">
            </input>
        </p>
        <p>
            <label for="imedia">média</label>
            <input type="number" name="media" id="imedia" max="10" min="0" placeholder="0 a 10 " step="0.1" required >
        </p>
        <p>
            <label for="imes">periodo letivo</label>
            <input type="month" name="mes" id="imes">
        </p>
        <p>
            <label for="idia"> dia da prova </label>
            <input type="date" name="dia" id="idia">
        </p>
        <p>
            <label for="itel"> telefone </label>
            <input type="tel" name="telefone" id="itel" pattern="^\(\d{2}\)\d{4,5}-\d{4,5}$" required placeholder="(xx)xxxx-xxxxx">
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
        
            </form>
        <p>
            <a href="form002.html"> formulario anterior </a>
        </p>
    </fieldset>
    <p>
        <a href="form004.html"> proximo formulario checkbox</a>
    </p>
</body>
</html>
