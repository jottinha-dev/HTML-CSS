<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario checkbox</title>
</head>
<body>
    <h1> exemplo de formulario </h1>
    <form action="cadastro.php" method="get" autocomplete="on">

        <div>
           
                <fieldset class="ola">
                    <legend>sexo</legend>
                    <input type="radio" name="sexo" id="isexm" value="M"> <label for="isexm">masculino</label><br>
                    <input type="radio" name="sexo" id="isexf" value="F"> <label for="isexf"> feminino</label>
                </fieldset>
            
                <fieldset>
                <legend> esportes favoritos </legend>
                <input type="checkbox" name="futebol" id="ifut"><label for="ifut">futebol</label><br>
                <input type="checkbox" name="volei" id="ivolei"><label for="ivolei">volei</label><br>
                <input type="checkbox" name="tenis" id="itenis"><label for="itenis">tenis</label><br>
                <input type="checkbox" name="golf" id="igolf"><label for="igolf">golf</label><br>
                   
                </fieldset>
        </div>

    <p>
        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </p>
    </form>
</body>
</html>
