<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> desafio tabela 1 </title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            text-decoration:none;
            color: black;
            padding: 10px;
            border-radius: 6px;
        }
        a:hover{
            color: rgb(255, 255, 255);
            background-color: rgb(0, 0, 0);
            transition-duration: 0.5s;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td{
            border: 2px solid black;
            padding: 5px;
            text-align: center;
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td> 1 </td>
            <td> 2 </td>
            <td rowspan="2"> 3 </td>
            <td> 4 </td>
        </tr>
        <tr>
            <td> 5 </td>
            <td> 6 </td>
            <td> 7 </td>
        </tr>
        <tr>
            <td colspan="3"> 8 </td>
            <td> 9 </td>
            
        </tr>
        <tr>
            <td rowspan="2"> 10 </td>
            <td colspan="2"> 11 </td>
            <td> 12 </td>
        </tr>
        <tr>
            <td>13 </td>
            <td>14 </td>
            <td>15 </td>
        </tr>
    </table>
    <p> <a href="desafio02.html"> próximo desafio</a></p>
</body>
</html>
